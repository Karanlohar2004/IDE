<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Rectangle</title>
    <style>
        /* Base page styling */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 40px;
        }

        /* The rectangle element */
        .print-rectangle {
            width: 300px;
            height: 150px;
            border: 2px solid #000;
            background-color: #f9f9f9;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }

        /* Button style */
        .print-btn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .print-btn:hover {
            background-color: #0056b3;
        }

        /* Print styling: hides everything except the rectangle when printing */
        @media print {
            body * {
                visibility: hidden;
            }
            .print-rectangle, .print-rectangle * {
                visibility: visible;
            }
            .print-rectangle {
                position: absolute;
                top: 0;
                left: 0;
                margin: 0;
                border: none; /* Optional: remove border for clean printout */
            }
        }
    </style>
</head>
<body>

    <h1>Printable Rectangle</h1>
    
    <!-- The rectangle container -->
    <div class="print-rectangle">
        Print Me!
    </div>

    <!-- Print trigger button -->
    <button class="print-btn" onclick="window.print()">Print Document</button>

</body>
</html>
